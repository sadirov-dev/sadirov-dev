                M140 96C308 156 416 242 540 232C688 219 768 126 904 130C989 132 1040 156 1080 189;
                M140 110C300 165 408 234 535 222C680 208 760 116 900 116C988 116 1040 146 1080 176"/>
    </path>
  </g>

  <g>
    <circle cx="455" cy="152" r="7" fill="#22C55E">
