name: Refresh Profile Signal

on:
  push:
    branches:
      - main
  schedule:
    - cron: "15 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Update generated profile signal block
        run: |
          python3 - <<'PY'
          from pathlib import Path
          from datetime import datetime, timezone

          readme = Path("README.md")
          text = readme.read_text()

          start = "<!-- profile-refresh:start -->"
          end = "<!-- profile-refresh:end -->"

          generated = "\n".join([
              start,
              f"- Last automated profile refresh: {datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')}",
              "- Active profile mode: Fullstack systems, AI-enabled products, premium engineering presentation",
              "- Automation status: README signal and contribution snake are enabled",
              end,
          ])

          before, rest = text.split(start, 1)
          _, after = rest.split(end, 1)
          readme.write_text(before + generated + after)
          PY

      - name: Commit changes if needed
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Refresh profile signal"
          git push
